services:
  # ----------------------------------------------------------------
  # 1. Backend Service (Node.js/Express)
  # ----------------------------------------------------------------
  - type: web
    name: nuta-backend
    env: node
    rootDir: ./
    buildCommand: pnpm install && pnpm run build
    startCommand: pnpm run start
    port: 3001
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: ${DATABASE_URL}
      - key: JWT_SECRET
        value: ${JWT_SECRET}
      - key: TWILIO_ACCOUNT_SID
        value: ${TWILIO_ACCOUNT_SID}
      - key: TWILIO_AUTH_TOKEN
        value: ${TWILIO_AUTH_TOKEN}
      - key: TWILIO_PHONE_NUMBER
        value: ${TWILIO_PHONE_NUMBER}
      - key: VITE_APP_ID
        value: ${VITE_APP_ID}
      - key: OWNER_OPEN_ID
        value: ${OWNER_OPEN_ID}
      - key: OWNER_NAME
        value: ${OWNER_NAME}

  # ----------------------------------------------------------------
  # 2. Frontend Service (Vite/React)
  # ----------------------------------------------------------------
  - type: static
    name: nuta-frontend
    rootDir: ./frontend
    buildCommand: pnpm install && pnpm run build
    publishPath: ./dist
    envVars:
      # Use the internal backend URL during Render build
      - key: VITE_API_URL
        value: http://nuta-backend:3001
      - key: VITE_APP_TITLE
        value: Nuta E-commerce
      - key: VITE_APP_LOGO
        value: /logo.svg
      - key: VITE_ANALYTICS_ENDPOINT
        value: https://analytics.example.com
      - key: VITE_ANALYTICS_WEBSITE_ID
        value: 123456789
