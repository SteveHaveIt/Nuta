# render.yaml for Nuta Project (Backend and Frontend)

services:
  # ----------------------------------------------------------------
  # 1. Backend Service (Node.js/Express)
  # ----------------------------------------------------------------
  - type: web
    name: nuta-backend
    env: node
    rootDir: ./
    buildCommand: pnpm install && pnpm run build
    startCommand: pnpm run start
    # Port 3001 is assumed based on common Node.js setups and previous context
    # If your server runs on a different port, change this.
    port: 3001
    # Environment variables are crucial for the backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        # IMPORTANT: Replace with your actual PostgreSQL or MySQL connection string
        value: ${DATABASE_URL}
      - key: JWT_SECRET
        # IMPORTANT: Replace with a strong, random secret
        value: ${JWT_SECRET}
      - key: TWILIO_ACCOUNT_SID
        # Optional: Only needed if you configure Twilio
        value: ${TWILIO_ACCOUNT_SID}
      - key: TWILIO_AUTH_TOKEN
        # Optional: Only needed if you configure Twilio
        value: ${TWILIO_AUTH_TOKEN}
      - key: TWILIO_PHONE_NUMBER
        # Optional: Only needed if you configure Twilio
        value: ${TWILIO_PHONE_NUMBER}
      # Add other necessary backend environment variables here (e.g., Manus OAuth)
      - key: VITE_APP_ID
        value: ${VITE_APP_ID}
      - key: OWNER_OPEN_ID
        value: ${OWNER_OPEN_ID}
      - key: OWNER_NAME
        value: ${OWNER_NAME}
    
  # ----------------------------------------------------------------
  # 2. Frontend Service (Vite/React)
  # ----------------------------------------------------------------
  - type: static
    name: nuta-frontend
    rootDir: ./frontend
    buildCommand: pnpm install && pnpm run build
    # The output directory for Vite builds is 'dist'
    publishPath: ./dist
    # Environment variables for the frontend build
    envVars:
      - key: VITE_API_URL
        # IMPORTANT: This must point to the public URL of the backend service
        # Render will automatically inject the correct internal URL, but for external access, 
        # you might need to set this manually in the Render dashboard after the first deploy.
        # For now, we use a placeholder that Render can resolve.
        value: https://nuta-backend.onrender.com
      - key: VITE_APP_TITLE
        value: Nuta E-commerce
      - key: VITE_APP_LOGO
        value: /logo.svg
      - key: VITE_ANALYTICS_ENDPOINT
        value: https://analytics.example.com
      - key: VITE_ANALYTICS_WEBSITE_ID
        value: 123456789
